<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terraria Pro Mobile</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #5ba0d0; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* Controles estilo consola */
        #ui-layer { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .joy-btn { 
            width: 70px; height: 70px; background: rgba(0,0,0,0.4); 
            border: 3px solid rgba(255,255,255,0.6); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; color: white; font-size: 30px; font-family: sans-serif;
        }
        .joy-btn:active { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-layer">
    <div style="display: flex; gap: 20px;">
        <div class="joy-btn" id="left">←</div>
        <div class="joy-btn" id="right">→</div>
    </div>
    <div class="joy-btn" id="jump">↑</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- ASSETS (Cargando imágenes de calidad) ---
const assets = {
    player: new Image(),
    dirt: new Image(),
    grass: new Image(),
    tree: new Image()
};

// Usamos spritesheets de calidad
assets.player.src = 'https://i.imgur.com/3pXInTh.png'; // Sprite tipo Terraria
assets.dirt.src = 'https://i.imgur.com/O6S6O6p.png';   // Bloque tierra detallado
assets.grass.src = 'https://i.imgur.com/YvVz7jH.png';  // Bloque pasto detallado
assets.tree.src = 'https://i.imgur.com/9v6v9p3.png';   // Árbol profesional

const TILE_SIZE = 32;
const GRAVITY = 0.6;
const WORLD_WIDTH = 100;
let map = [];

// Generar mundo más natural
function initWorld() {
    for(let y=0; y<30; y++) {
        map[y] = [];
        for(let x=0; x<WORLD_WIDTH; x++) {
            if(y > 15) map[y][x] = 'dirt';
            else if(y === 15) map[y][x] = 'grass';
            else map[y][x] = null;
        }
    }
    // Añadir árboles en posiciones fijas
    for(let x=5; x<WORLD_WIDTH; x+=10) {
        map[14][x] = 'tree'; 
    }
}

const player = {
    x: 100, y: 100, w: 28, h: 48,
    vx: 0, vy: 0, 
    speed: 4, jump: -12,
    grounded: false, flip: false,
    frame: 0, animTick: 0
};

const cam = { x: 0, y: 0 };
const input = { left: false, right: false, jump: false };

// Controles táctiles
const setupBtn = (id, key) => {
    const btn = document.getElementById(id);
    btn.ontouchstart = (e) => { e.preventDefault(); input[key] = true; };
    btn.ontouchend = (e) => { e.preventDefault(); input[key] = false; };
};
setupBtn('left', 'left'); setupBtn('right', 'right'); setupBtn('jump', 'jump');

function update() {
    if(input.left) { player.vx = -player.speed; player.flip = true; }
    else if(input.right) { player.vx = player.speed; player.flip = false; }
    else player.vx = 0;

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Colisión simple con el suelo (y=15)
    let groundY = 15 * TILE_SIZE;
    if(player.y + player.h > groundY) {
        player.y = groundY - player.h;
        player.vy = 0;
        player.grounded = true;
    } else {
        player.grounded = false;
    }

    if(input.jump && player.grounded) {
        player.vy = player.jump;
        player.grounded = false;
    }

    // Animación
    if(player.vx !== 0) {
        player.animTick++;
        if(player.animTick > 5) {
            player.frame = (player.frame + 1) % 4;
            player.animTick = 0;
        }
    } else {
        player.frame = 0;
    }

    // Cámara sigue al jugador
    cam.x = player.x - canvas.width/2;
    cam.y = player.y - canvas.height/2;
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    // Dibujar Mundo
    for(let y=0; y<map.length; y++) {
        for(let x=0; x<WORLD_WIDTH; x++) {
            let tile = map[y][x];
            let px = x * TILE_SIZE;
            let py = y * TILE_SIZE;

            if(tile === 'dirt') ctx.drawImage(assets.dirt, px, py, TILE_SIZE, TILE_SIZE);
            if(tile === 'grass') ctx.drawImage(assets.grass, px, py, TILE_SIZE, TILE_SIZE);
            if(tile === 'tree') {
                // Dibujar árbol grande (los árboles no son bloques, son adornos)
                ctx.drawImage(assets.tree, px - 32, py - 128, 96, 160);
            }
        }
    }

    // Dibujar Jugador
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    if(player.flip) ctx.scale(-1, 1);
    // Dibujamos una sección del sprite (animación)
    ctx.drawImage(assets.player, 
        player.frame * 32, 0, 32, 48, 
        -player.w/2, -player.h/2, player.w, player.h
    );
    ctx.restore();

    ctx.restore();
    requestAnimationFrame(draw);
}

initWorld();
setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
