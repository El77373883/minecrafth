<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Pixel Texture</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #87CEEB; }
        #controles {
            position: absolute; bottom: 30px; left: 30px;
            display: grid; grid-template-columns: repeat(3, 60px); gap: 8px; z-index: 10;
        }
        .btn {
            width: 60px; height: 60px; background: rgba(0,0,0,0.5);
            border: 2px solid #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; user-select: none;
        }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="controles">
        <div class="btn" id="btn-up">↑</div>
        <div class="btn" id="btn-left">←</div>
        <div class="btn" id="btn-down">↓</div>
        <div class="btn" id="btn-right">→</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        // 1. MOTOR DE RENDERIZADO
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // 2. GENERADOR DE TEXTURAS PIXELADAS (Estilo Minecraft)
        function createPixelTexture(colorBase) {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    // Variación de color aleatoria para efecto ruido/píxel
                    const noise = Math.random() * 20;
                    ctx.fillStyle = `rgb(${colorBase.r - noise}, ${colorBase.g - noise}, ${colorBase.b - noise})`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.magFilter = THREE.NearestFilter; // Mantiene los píxeles nítidos
            texture.minFilter = THREE.NearestFilter;
            return texture;
        }

        const grassTex = createPixelTexture({r: 90, g: 160, b: 60});
        const dirtTex = createPixelTexture({r: 120, g: 80, b: 50});

        // Materiales para las 6 caras del bloque de pasto (Top, Bottom, Sides)
        const grassMaterials = [
            new THREE.MeshLambertMaterial({map: dirtTex}), // derecha
            new THREE.MeshLambertMaterial({map: dirtTex}), // izquierda
            new THREE.MeshLambertMaterial({map: grassTex}), // arriba (pasto)
            new THREE.MeshLambertMaterial({map: dirtTex}), // abajo
            new THREE.MeshLambertMaterial({map: dirtTex}), // frente
            new THREE.MeshLambertMaterial({map: dirtTex}), // atrás
        ];

        // 3. TERRENO
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        for (let x = -12; x < 12; x++) {
            for (let z = -12; z < 12; z++) {
                const block = new THREE.Mesh(boxGeo, grassMaterials);
                block.position.set(x, 0, z);
                scene.add(block);
            }
        }

        // 4. CÁMARA Y CONTROLES (Iphone)
        camera.position.set(0, 2.5, 5);
        let move = { f: false, b: false, l: false, r: false };
        let yaw = 0, pitch = 0, lastX = 0, lastY = 0;

        const setupBtn = (id, dir) => {
            document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); move[dir] = true; });
            document.getElementById(id).addEventListener('touchend', (e) => { e.preventDefault(); move[dir] = false; });
        };
        setupBtn('btn-up', 'f'); setupBtn('btn-down', 'b');
        setupBtn('btn-left', 'l'); setupBtn('btn-right', 'r');

        document.addEventListener('touchstart', e => { 
            if(e.touches[0].target.tagName === 'CANVAS'){
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY; 
            }
        });
        document.addEventListener('touchmove', e => {
            if(e.touches[0].target.tagName === 'CANVAS'){
                const sensitivity = 0.005;
                yaw -= (e.touches[0].pageX - lastX) * sensitivity;
                pitch -= (e.touches[0].pageY - lastY) * sensitivity;
                pitch = Math.max(-1.5, Math.min(1.5, pitch));
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            }
        }, { passive: false });

        // 5. ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            
            const speed = 0.1;
            if (move.f) camera.translateZ(-speed);
            if (move.b) camera.translateZ(speed);
            if (move.l) camera.translateX(-speed);
            if (move.r) camera.translateX(speed);
            
            camera.position.y = 1.8; // Altura fija
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
