<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Mobile: World Expansion</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; background: #87CEEB; }
        #controles {
            position: absolute; bottom: 30px; left: 30px;
            display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; z-index: 10;
        }
        .btn {
            width: 65px; height: 65px; background: rgba(0,0,0,0.5);
            border: 2px solid #fff; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; user-select: none;
        }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div id="controles">
        <div class="btn" id="btn-up">↑</div>
        <div class="btn" id="btn-left">←</div>
        <div class="btn" id="btn-down">↓</div>
        <div class="btn" id="btn-right">→</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        // Añadimos niebla para que el mundo grande se vea mejor
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        function createPixelTexture(r, g, b, noise = 20) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    const n = Math.random() * noise;
                    ctx.fillStyle = `rgb(${r-n}, ${g-n}, ${b-n})`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        const grassTex = createPixelTexture(100, 180, 70);
        const dirtTex = createPixelTexture(130, 90, 60);
        const woodTex = createPixelTexture(90, 60, 40, 30);
        const leafTex = createPixelTexture(60, 140, 50, 40);
        const pigTex = createPixelTexture(255, 170, 180, 10);

        const grassMat = [
            new THREE.MeshLambertMaterial({map: dirtTex}), new THREE.MeshLambertMaterial({map: dirtTex}),
            new THREE.MeshLambertMaterial({map: grassTex}), new THREE.MeshLambertMaterial({map: dirtTex}),
            new THREE.MeshLambertMaterial({map: dirtTex}), new THREE.MeshLambertMaterial({map: dirtTex})
        ];
        const woodMat = new THREE.MeshLambertMaterial({map: woodTex});
        const leafMat = new THREE.MeshLambertMaterial({map: leafTex});
        const pigMat = new THREE.MeshLambertMaterial({map: pigTex});
        const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
        const snoutMat = new THREE.MeshLambertMaterial({color: 0xffa0b0});

        // GENERACIÓN DE MUNDO GRANDE (Radio 40)
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        for (let x = -40; x < 40; x++) {
            for (let z = -40; z < 40; z++) {
                const block = new THREE.Mesh(boxGeo, grassMat);
                block.position.set(x, 0, z);
                scene.add(block);

                if (Math.random() > 0.985) { // Árboles
                    const h = 3 + Math.floor(Math.random()*2);
                    for(let i=1; i<=h; i++) {
                        const t = new THREE.Mesh(boxGeo, woodMat);
                        t.position.set(x, i, z);
                        scene.add(t);
                    }
                    for(let lx=-1; lx<=1; lx++) {
                        for(let lz=-1; lz<=1; lz++) {
                            const l = new THREE.Mesh(boxGeo, leafMat);
                            l.position.set(x+lx, h+1, z+lz);
                            scene.add(l);
                        }
                    }
                }
            }
        }

        // CREACIÓN DEL ANIMAL CON CARA
        function createPig() {
            const group = new THREE.Group();
            // Cuerpo
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 1.2), pigMat);
            body.position.y = 0.7;
            group.add(body);
            // Cabeza
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), pigMat);
            head.position.set(0, 1.0, 0.7);
            group.add(head);
            // Ojos
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), eyeMat);
            eyeL.position.set(0.2, 1.1, 1.0);
            const eyeR = eyeL.clone();
            eyeR.position.x = -0.2;
            group.add(eyeL, eyeR);
            // Hocico
            const snout = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 0.2), snoutMat);
            snout.position.set(0, 0.9, 1.0);
            group.add(snout);
            // Patas
            for(let i=0; i<4; i++){
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.4, 0.2), pigMat);
                leg.position.set(i<2?0.25:-0.25, 0.2, i%2?0.3:-0.3);
                group.add(leg);
            }
            return group;
        }

        const pig = createPig();
        scene.add(pig);
        pig.position.set(5, 0, 5);

        // CONTROLES
        camera.position.set(0, 2, 5);
        let move = { f: false, b: false, l: false, r: false };
        let yaw = 0, pitch = 0, lastX = 0, lastY = 0;

        const setupBtn = (id, dir) => {
            document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); move[dir] = true; });
            document.getElementById(id).addEventListener('touchend', (e) => { e.preventDefault(); move[dir] = false; });
        };
        setupBtn('btn-up', 'f'); setupBtn('btn-down', 'b'); setupBtn('btn-left', 'l'); setupBtn('btn-right', 'r');

        document.addEventListener('touchstart', e => { 
            if(e.touches[0].target.tagName === 'CANVAS'){
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY; 
            }
        });
        document.addEventListener('touchmove', e => {
            if(e.touches[0].target.tagName === 'CANVAS'){
                yaw -= (e.touches[0].pageX - lastX) * 0.005;
                pitch -= (e.touches[0].pageY - lastY) * 0.005;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            }
        }, { passive: false });

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.order = "YXZ";
            camera.rotation.y = yaw; camera.rotation.x = pitch;
            
            const speed = 0.15;
            if (move.f) camera.translateZ(-speed);
            if (move.b) camera.translateZ(speed);
            if (move.l) camera.translateX(-speed);
            if (move.r) camera.translateX(speed);
            camera.position.y = 1.8;

            // Animación del cerdito
            pig.position.z += 0.03;
            if(Math.sin(Date.now()*0.001) > 0.9) pig.rotation.y += 0.1;
            if(pig.position.z > 35) pig.position.z = -35;
            if(pig.position.x > 35) pig.position.x = -35;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
